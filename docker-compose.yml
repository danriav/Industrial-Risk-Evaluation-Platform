name: mero

services:
  frontend:
    image: ${FRONTEND_IMAGE:-mero-frontend:local}
    build:
      context: ./src/web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    container_name: mero-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - mero_public
      - mero_internal

  backend:
    image: ${BACKEND_IMAGE:-mero-backend:local}
    build:
      context: .
      dockerfile: src/api/Dockerfile
    container_name: mero-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
      BASIC_AUTH_USERNAME: ${BASIC_AUTH_USERNAME:-mero_admin}
      BASIC_AUTH_PASSWORD: ${BASIC_AUTH_PASSWORD:-CHANGE_ME_STRONG_BASIC_AUTH_PASSWORD}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      FORCE_HTTPS: ${FORCE_HTTPS:-false}
      MODEL_PATH: ${MODEL_PATH:-artifacts/models/random_forest.joblib}
    volumes:
      - ./artifacts/models:/app/artifacts/models:ro
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - mero_public
      - mero_internal

  database:
    image: postgres:${POSTGRES_VERSION:-16-alpine}
    container_name: mero-database
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mero_public
      - mero_internal

  db-backup:
    image: postgres:${POSTGRES_VERSION:-16-alpine}
    container_name: mero-db-backup
    restart: unless-stopped
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: database
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_RETRY_SECONDS: ${BACKUP_RETRY_SECONDS:-10}
      BACKUP_MAX_ATTEMPTS: ${BACKUP_MAX_ATTEMPTS:-12}
    volumes:
      - ./backups:/backups
      - ./scripts:/scripts:ro
    entrypoint: ["/bin/sh", "/scripts/postgres-backup-cron.sh"]
    depends_on:
      database:
        condition: service_healthy
    networks:
      - mero_internal

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:${POSTGRES_EXPORTER_VERSION:-v0.15.0}
    container_name: mero-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}?sslmode=disable
    depends_on:
      database:
        condition: service_healthy
    networks:
      - mero_internal

  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION:-v2.53.0}
    container_name: mero-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      backend:
        condition: service_started
      postgres-exporter:
        condition: service_started
    networks:
      - mero_public
      - mero_internal

  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-11.1.0}
    container_name: mero-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - mero_public
      - mero_internal

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  mero_public:
    name: mero_public
  mero_internal:
    name: mero_internal
    internal: true
