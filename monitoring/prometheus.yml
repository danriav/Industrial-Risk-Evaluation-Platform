global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: mero-backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:8080

  - job_name: mero-postgres
    static_configs:
      - targets:
          - postgres-exporter:9187
